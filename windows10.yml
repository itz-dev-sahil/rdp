services:
windows:
image: dockurr/windows
container_name: windows

environment:
  VERSION: "10"
  USERNAME: "MASTER"
  PASSWORD: "admin@123"
  RAM_SIZE: "50G"
  CPU_CORES: "8"
  DISK_SIZE: "150G"

devices:
  - /dev/kvm
  - /dev/net/tun

cap_add:
  - NET_ADMIN

ports:
  - "80:8006"
  - "3389:3389/tcp"
  - "3389:3389/udp"

restart: unless-stopped
